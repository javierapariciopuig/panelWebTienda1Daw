<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nuevo Producto</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="tarjeta.css" />
</head>
<body>

  <!-- MODAL siempre visible -->
  <div class="modal">

    <div class="modal-header">
      <h2>Nuevo Producto</h2>
      <button class="modal-close" id="modalClose">✕</button>
    </div>

    <div class="modal-body">

      <!-- Imagen -->
      <div>
        <label class="field-label">Imagen del Producto</label>
        <div class="img-upload-row">
          <div class="img-preview-box" id="imgPreviewBox">
            <span class="img-placeholder-icon">🖼️</span>
          </div>
          <div class="img-upload-controls">
            <input class="field-input" type="url" id="inputImgUrl" placeholder="URL de la imagen" />
            <button class="btn-upload" id="btnSubirImagen">⬆️ Subir Imagen</button>
            <input type="file" id="fileInput" accept="image/*" />
          </div>
        </div>
      </div>

      <!-- Nombre -->
      <div>
        <label class="field-label">Nombre del Producto</label>
        <input class="field-input" type="text" id="inputNombre" placeholder="Ej: Pan Integral" />
      </div>

      <!-- Categoría -->
      <div>
        <label class="field-label">Categoría</label>
        <select class="field-input" id="inputCategoria">
          <option value="ALIMENTACIÓN">ALIMENTACIÓN</option>
          <option value="PANADERÍA">PANADERÍA</option>
          <option value="LIMPIEZA">LIMPIEZA</option>
          <option value="HIGIENE">HIGIENE</option>
          <option value="BEBIDAS">BEBIDAS</option>
        </select>
      </div>

      <!-- Descripción -->
      <div>
        <label class="field-label">Descripción</label>
        <textarea class="field-input" id="inputDesc" placeholder="Describe el producto…"></textarea>
      </div>

      <!-- Precio -->
      <div>
        <label class="field-label">Precio</label>
        <input class="field-input" type="number" id="inputPrecio" placeholder="Ej: 9.99" step="0.01" min="0" />
      </div>

      <!-- Vista Previa -->
      <div>
        <label class="field-label">Vista Previa</label>
        <div class="preview-box">
          <div class="preview-name" id="pvNombre">Nombre del producto</div>
          <div class="preview-desc"  id="pvDesc">Descripción del producto</div>
          <div class="preview-price" id="pvPrecio">0.00€</div>
          <span class="badge"        id="pvCat">ALIMENTACIÓN</span>
        </div>
      </div>

    </div>

    <div class="modal-footer">
      <button class="btn-cancel" id="btnCancelar">✕ Cancelar</button>
      <button class="btn-save"   id="btnGuardar">💾 Guardar Producto</button>
    </div>

  </div>

  <script src="tarjeta.js"></script>
</body>
</html>
